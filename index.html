<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسار - تسجيل الدخول الآمن</title>
    <style>
        body { background-color: #f0f2f5; color: #333; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #ffffff; padding: 40px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #27ae60; }
        .logo-container img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #27ae60; margin-bottom: 15px; padding: 5px; background: white; }
        h2 { color: #2c3e50; margin-bottom: 25px; font-size: 22px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; background: #f9f9f9; text-align: center; }
        input:focus { outline: none; border-color: #27ae60; background: #fff; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:hover { background: #219150; transform: translateY(-2px); }
        #msg { color: #e74c3c; margin-top: 15px; font-weight: bold; font-size: 14px; }
        .footer-text { margin-top: 25px; font-size: 13px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="box">
    <div class="logo-container">
        <img src="logo.png" alt="شعار مسار" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
    </div>

    <h2>تسجيل الدخول - مسار برو</h2>

    <input type="email" id="email" placeholder="أدخل الإيميل المسجل">
    <input type="text" id="code" placeholder="أدخل كود الاشتراك الخاص بك">

    <button onclick="login()">دخول للمكتبة</button>

    <p id="msg"></p>

    <p class="footer-text">جميع الحقوق محفوظة لمشروع مسار © 2026</p>
</div>

<script>
// قائمة المشتركين المعتمدة
// أضفت إيميلك هنا ليعمل الكود معك فوراً
const subscribers = [
    { email: "krgalealibakar@gmail.com", code: "MASAR-9921-KZ" },
    { email: "ali@gmail.com", code: "MASAR-1122-AL" },
    { email: "test@test.com", code: "9900" }
];

function login() {
    const emailInput = document.getElementById("email").value.trim().toLowerCase();
    const codeInput = document.getElementById("code").value.trim();
    const msgElement = document.getElementById("msg");

    if (emailInput === "" || codeInput === "") {
        msgElement.innerHTML = "⚠️ يرجى تعبئة جميع الحقول";
        return;
    }

    // البحث عن المستخدم في القائمة أعلاه
    const user = subscribers.find(s => s.email === emailInput && s.code === codeInput);

    if (user) {
        msgElement.style.color = "#27ae60";
        msgElement.innerHTML = "✅ جاري الدخول...";
        setTimeout(() => {
            window.location.href = "home.html";
        }, 1000);
    } else {
        msgElement.style.color = "#e74c3c";
        msgElement.innerHTML = "❌ الإيميل أو كود الاشتراك غير صحيح";
    }
}
</script>

</body>
</html>
