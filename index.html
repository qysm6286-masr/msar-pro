<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول - مسار</title>

<style>
body{
background:#0f172a;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:10px;
background:#38bdf8;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#msg{
color:red;
margin-top:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="أدخل الإيميل">

<input type="text" id="code" placeholder="أدخل كود الاشتراك">

<button onclick="login()">دخول</button>

<p id="msg"></p>

</div>

<script>
function login(){

var email = document.getElementById("email").value;
var code = document.getElementById("code").value;

// مثال كود مؤقت
if(email !== "" && code == "1234"){
window.location.href = "home.html";
}else{
document.getElementById("msg").innerHTML = "الكود غير صحيح";
}

}
</script>

</body>
</html>
