<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - عرض المخطط</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; text-align: center; }
        .nav-bar { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: #1a1a1a; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 15px; border-bottom: 2px solid #27ae60; z-index: 1000; 
        }
        .back-btn { background: #e74c3c; color: white; padding: 5px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .image-container { margin-top: 60px; display: block; width: 100%; }
        
        /* هذا الجزء هو الذي سيحل مشكلة التشويه والتقسيم */
        img { 
            width: 100%; /* تجعل الصورة تأخذ عرض الشاشة بالكامل */
            height: auto; /* تحافظ على الأبعاد لكي لا تظهر مقصوصة أو مشوهة */
            display: block; /* تضع الصور تحت بعضها البعض */
            margin-bottom: 10px; /* مسافة بسيطة بين كل مخطط والآخر */
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <span style="color: #27ae60; font-weight: bold;">مشروع مسار - A01</span>
        <a href="samsung.html" class="back-btn">خروج</a>
    </div>

    <div class="image-container" id="gallery"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const ids = params.get('ids');
        if (ids) {
            const links = ids.split(',');
            const gallery = document.getElementById('gallery');
            links.forEach(link => {
                const img = document.createElement('img');
                img.src = link.trim();
                gallery.appendChild(img);
            });
        }
    </script>
</body>
</html>
