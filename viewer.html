<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - عرض المخطط</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; font-family: Arial, sans-serif; color: white; }
        
        /* شريط علوي ثابت */
        .nav-bar { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: #1a1a1a; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 15px; border-bottom: 2px solid #27ae60; z-index: 1000; 
        }

        .back-btn { background: #e74c3c; color: white; padding: 6px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }

        /* حاوية الصور */
        .image-container { margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px; }
        
        .img-item { width: 100%; max-width: 1000px; border: 1px solid #333; }
        
        img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <span style="color: #27ae60;">مشروع مسار | عرض الصور</span>
        <a href="samsung.html" class="back-btn">العودة للموديلات</a>
    </div>

    <div class="image-container" id="gallery">
        </div>

    <script>
        // دالة لجلب الـ IDs من الرابط
        // سنضع الـ IDs في الرابط هكذا: id1,id2,id3
        const params = new URLSearchParams(window.location.search);
        const idsString = params.get('ids');
        
        if (idsString) {
            const idsArray = idsString.split(',');
            const gallery = document.getElementById('gallery');
            
            idsArray.forEach(id => {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'img-item';
                // رابط مباشر لعرض صورة من جوجل درايف
                imgDiv.innerHTML = <img src="https://drive.google.com/uc?export=view&id=${id.trim()}" alt="مخطط مسار">;
                gallery.appendChild(imgDiv);
            });
        }
    </script>
</body>
</html>
