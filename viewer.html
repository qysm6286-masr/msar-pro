<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>مشروع مسار - عرض المخطط</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #1a1a1a; font-family: Arial, sans-serif; text-align: center; }
        
        .nav-bar { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: #111; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 15px; border-bottom: 2px solid #27ae60; z-index: 1000; 
        }

        .back-btn { background: #e74c3c; color: white; padding: 5px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }

        .image-container { 
            margin-top: 60px; 
            padding: 5px;
            display: block; /* لضمان ظهور الصور تحت بعضها بدقة */
        }

        img { 
            width: auto; /* لعدم مط الصورة والحفاظ على جودتها */
            max-width: 100%; /* لكي لا تخرج عن حدود الشاشة */
            height: auto; 
            margin-bottom: 2px; /* تقليل الفراغ بين القطع لتبدو كأنها صفحة واحدة */
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <span style="color: #27ae60; font-weight: bold;">مسار: A01 (A015)</span>
        <a href="samsung.html" class="back-btn">خروج</a>
    </div>

    <div class="image-container" id="gallery">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idsString = params.get('ids');
        const gallery = document.getElementById('gallery');

        if (idsString) {
            const links = idsString.split(',');
            links.forEach(link => {
                const img = document.createElement('img');
                img.src = link.trim();
                gallery.appendChild(img);
            });
        }
    </script>
</body>
</html>
