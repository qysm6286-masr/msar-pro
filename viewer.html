<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - العارض الاحترافي</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        .nav-bar { background: #1a1a1a; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #27ae60; position: relative; z-index: 1000; }
        .back-btn { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .container { height: calc(100vh - 55px); width: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <span>مشروع مسار | المخطط التقني</span>
        <a href="samsung.html" class="back-btn">إغلاق المخطط</a>
    </div>
    <div class="container" id="viewer-container">
        </div>

    <script>
        // دالة لجلب الـ ID من الرابط مهما كان شكله
        function getFileId() {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id');
            if (!id) {
                // محاولة أخرى في حال كان الرابط مكتوباً بشكل مختلف
                const pathParts = window.location.href.split('id=');
                if (pathParts.length > 1) id = pathParts[1];
            }
            return id;
        }

        const fileId = getFileId();
        
        if (fileId) {
            // تنظيف الـ ID من أي زوائد
            const cleanId = fileId.split('&')[0]; 
            const container = document.getElementById('viewer-container');
            // استخدام رابط المعاينة الرسمي
            container.innerHTML = <iframe src="https://drive.google.com/file/d/${cleanId}/preview"></iframe>;
        } else {
            document.getElementById('viewer-container').innerHTML = "<h2 style='color:white; text-align:center; margin-top:50px;'>عذراً، لم يتم العثور على المخطط.. تأكد من الرابط</h2>";
        }
    </script>
</body>
</html>
