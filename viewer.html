<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - عرض المخطط</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; font-family: Arial, sans-serif; color: white; text-align: center; }
        .nav-bar { position: fixed; top: 0; width: 100%; height: 55px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 3px solid #27ae60; z-index: 1000; }
        .back-btn { background: #e74c3c; color: white; padding: 8px 18px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .image-container { margin-top: 70px; display: flex; flex-direction: column; align-items: center; gap: 5px; padding-bottom: 50px; }
        img { width: 100%; max-width: 1200px; height: auto; display: block; background: #111; border-bottom: 1px solid #222; }
        .loading-text { color: #27ae60; margin-top: 100px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <span style="font-weight: bold; color: #27ae60;">مشروع مسار | مخطط A01</span>
        <a href="samsung.html" class="back-btn">خروج</a>
    </div>

    <div class="image-container" id="gallery">
        <div id="loader" class="loading-text">جاري فتح مسارات المخطط...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const idsString = params.get('ids');
        const gallery = document.getElementById('gallery');
        const loader = document.getElementById('loader');

        if (idsString) {
            const links = idsString.split(',');
            let loadedCount = 0;

            links.forEach(link => {
                const img = new Image();
                img.src = link.trim();
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === 1) loader.style.display = 'none'; // إخفاء التحميل عند ظهور أول صورة
                    gallery.appendChild(img);
                };
                img.onerror = () => {
                    console.error("فشل تحميل: " + link);
                };
            });
        }
    </script>
</body>
</html>
