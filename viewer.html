<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - العارض الاحترافي</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        .nav-bar { background: #1a1a1a; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #27ae60; }
        .back-btn { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .container { height: calc(100vh - 55px); width: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <span>مشروع مسار | المخطط التقني</span>
        <a href="samsung.html" class="back-btn">إغلاق المخطط</a>
    </div>
    <div class="container" id="viewer-container">
        </div>

    <script>
        // كود ذكي لاستخراج ID من الرابط وعرض الملف
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        
        if (fileId) {
            const container = document.getElementById('viewer-container');
            container.innerHTML = <iframe src="https://drive.google.com/file/d/${fileId}/preview"></iframe>;
        } else {
            document.body.innerHTML = "<h1 style='color:white; text-align:center;'>عذراً، لم يتم العثور على المخطط</h1>";
        }
    </script>
</body>
</html>
