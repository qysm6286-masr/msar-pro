<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - عرض المخطط</title>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; font-family: Arial, sans-serif; color: white; text-align: center; }
        .nav-bar { position: fixed; top: 0; width: 100%; height: 50px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid #27ae60; z-index: 1000; }
        .back-btn { background: #e74c3c; color: white; padding: 6px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .image-container { margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        /* هنا السر: استخدمنا iframe لكل صورة لضمان التوافق مع جوجل */
        .img-box { width: 98%; max-width: 1000px; height: 600px; border: 1px solid #333; margin-bottom: 10px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <span>مشروع مسار | مخطط A01</span>
        <a href="samsung.html" class="back-btn">عودة</a>
    </div>

    <div class="image-container" id="gallery"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ids = urlParams.get('ids');
        const gallery = document.getElementById('gallery');

        if (ids) {
            const idsArray = ids.split(',');
            idsArray.forEach((id) => {
                const cleanId = id.trim();
                if (cleanId) {
                    const box = document.createElement('div');
                    box.className = 'img-box';
                    // الرابط الذي يفتح المعاينة الرسمية لكل صورة داخل الموقع
                    box.innerHTML = <iframe src="https://drive.google.com/file/d/${cleanId}/preview"></iframe>;
                    gallery.appendChild(box);
                }
            });
        }
    </script>
</body>
</html>
