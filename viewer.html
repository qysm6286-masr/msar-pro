<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - عرض المخطط</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        .nav-bar { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: #111; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 15px; border-bottom: 2px solid #27ae60; z-index: 1000; 
            box-sizing: border-box;
        }
        .back-btn { background: #e74c3c; color: white; padding: 5px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .pdf-container { width: 100%; height: 100vh; padding-top: 50px; box-sizing: border-box; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <span style="color: #27ae60; font-weight: bold;">مشروع مسار | A01</span>
        <a href="samsung.html" class="back-btn">خروج</a>
    </div>

    <div class="pdf-container">
        <iframe id="pdfFrame" src=""></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('fileId');
        if (fileId) {
            // هذا الرابط يفتح معاينة جوجل درايف الرسمية مع الزوم
            document.getElementById('pdfFrame').src = https://docs.google.com/viewer?srcid=${fileId}&embedded=true;
        }
    </script>
</body>
</html>
