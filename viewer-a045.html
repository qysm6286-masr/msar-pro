<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - العرض الاحترافي</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        .nav-bar { 
            background: #1a1a1a; color: #fff; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #27ae60; position: relative; z-index: 1000;
        }
        .back-btn { background: #27ae60; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; }
        
        .container { 
            height: calc(100vh - 55px); width: 100%; 
            position: relative; /* ضروري لضبط مكان الحجب */
        }

        iframe { 
            width: 100%; height: 100%; border: none; 
        }

        /* حيلة حجب سهم الفتح الخارجي */
        .hide-arrow {
            position: absolute;
            top: 0;
            left: 0; /* لأن السهم يظهر في جهة اليسار في العرض العربي أو اليمين أحياناً */
            width: 60px; /* عرض منطقة الحجب */
            height: 60px; /* طول منطقة الحجب */
            background: #1a1a1a; /* نفس لون خلفية الدرايف السوداء */
            z-index: 999;
            cursor: default;
        }

        /* إذا ظهر السهم في الجهة الأخرى (اليمين) استخدم هذا */
        .hide-arrow-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: #1a1a1a;
            z-index: 999;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="nav-bar">
        <span>مشروع مسار | المخطط التقني</span>
        <a href="samsung.html" class="back-btn">العودة للموديلات</a>
    </div>

    <div class="container">
        <div class="hide-arrow"></div>
        <div class="hide-arrow-right"></div>

        <iframe src="https://drive.google.com/file/d/15h3VQP7zTfgmhaPhlENO7QvGeEWc2Y0P/preview"></iframe>
    </div>

    <script>
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 's'  e.key === 'p'  e.key === 'u' || (e.shiftKey && e.key === 'I'))) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
