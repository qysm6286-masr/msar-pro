<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسار - Phone Models</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1220,#111c33);
color:#fff;
padding:20px;
}

/* العنوان */
.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:36px;
margin:0;
color:#38bdf8;
}

.header p{
margin-top:8px;
color:#94a3b8;
font-size:14px;
}

/* شبكة الشركات */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
max-width:600px;
margin:auto;
}

/* بطاقات الشركات */
.card{
background:#1e293b;
padding:20px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

.card:hover{
background:#38bdf8;
transform:scale(1.05);
}

/* الفئات */
.sub{
display:none;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
grid-column:span 3;
}

.small{
background:#334155;
border:none;
padding:10px;
border-radius:10px;
color:#fff;
font-size:13px;
cursor:pointer;
transition:0.3s;
}

.small:hover{
background:#38bdf8;
}
</style>

</head>

<body>

<div class="header">
<h1>📱 Model Library</h1>
<p>مكتبة مسار - جميع مديلات الهواتف في مكان واحد</p>
</div>

<div class="grid">

<!-- Samsung -->
<div class="card" onclick="window.location.href='samsung.html'">Samsung</div>
<!-- Redmi -->
<div class="card" onclick="window.location.href='redmi.html'">redmi</div>

<!-- Infinix -->
<div class="card" onclick="window.location.href='infinix.html'">infinix</div>

<!-- Tecno -->
<div class="card"onclick="window.location.href='tecno.html'">tecno</div>

<!-- Huawei -->
<div class="card"onclick="window.location.href='huawei.html'">huawei</div>

<!-- Realme -->
<div class="card">Realme</div>

<!-- Vivo -->
<div class="card">Vivo</div>

<!-- Oppo -->
<div class="card">Oppo</div>

<!-- Nokia -->
<div class="card">Nokia</div>

<!-- iPhone -->
<div class="card">iPhone</div>

<!-- Folders -->

<div id="samsung" class="sub">
<button class="small">Galaxy A</button>
<button class="small">Galaxy M</button>
<button class="small">Galaxy S</button>
</div>

<div id="redmi" class="sub">
<button class="small">Note</button>
<button class="small">Redmi</button>
<button class="small">Pro</button>
</div>

<div id="infinix" class="sub">
<button class="small">Hot</button>
<button class="small">Note</button>
<button class="small">Smart</button>
</div>

</div>

<script>
function toggle(id){
var el = document.getElementById(id);

if(el.style.display === "grid"){
el.style.display = "none";
}else{
el.style.display = "grid";
}
}
</script>

</body>
</html>
