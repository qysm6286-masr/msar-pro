<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسار - المديلات</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
padding:20px;
}

/* العنوان */
.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:28px;
margin:0;
color:#38bdf8;
}

.header p{
margin-top:5px;
color:#94a3b8;
font-size:14px;
}

/* الأقسام */
.section{
margin-bottom:20px;
}

/* أزرار الشركات */
.company-btn{
width:100%;
padding:18px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#1e293b;
color:#fff;
font-size:18px;
cursor:pointer;
transition:0.3s;
text-align:right;
}

.company-btn:hover{
background:#38bdf8;
}

/* فئات المديلات */
.sub{
display:none;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:15px;
}

.small{
padding:12px;
border:none;
border-radius:10px;
background:#334155;
color:#fff;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.small:hover{
background:#38bdf8;
}

/* شكل فتح */
.show{
display:grid;
}
</style>

</head>

<body>

<div class="header">
<h1>📱 مديلات الهاتف</h1>
<p>كل الشركات في مكان واحد داخل مكتبة مسار</p>
</div>

<!-- سامسونج -->
<div class="section">
<button class="company-btn" onclick="toggle('samsung')">سامسونج</button>
<div id="samsung" class="sub">
<button class="small">A</button>
<button class="small">M</button>
<button class="small">S</button>
</div>
</div>

<!-- ريدمي -->
<div class="section">
<button class="company-btn" onclick="toggle('redmi')">ريدمي</button>
<div id="redmi" class="sub">
<button class="small">Note</button>
<button class="small">Redmi</button>
<button class="small">Pro</button>
</div>
</div>

<!-- انفنكس -->
<div class="section">
<button class="company-btn" onclick="toggle('infinix')">إنفنكس</button>
<div id="infinix" class="sub">
<button class="small">Hot</button>
<button class="small">Note</button>
<button class="small">Smart</button>
</div>
</div>

<!-- شركات أخرى -->
<div class="section">
<button class="company-btn">نوكيا</button>
<button class="company-btn">هواوي</button>
<button class="company-btn">أوبو</button>
<button class="company-btn">فيفو</button>
</div>

<script>
function toggle(id){
var el = document.getElementById(id);

if(el.classList.contains("show")){
el.classList.remove("show");
}else{
el.classList.add("show");
}
}
</script>

</body>
</html>
