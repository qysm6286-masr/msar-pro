<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسار PRO — المكتبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d1f;--card:#0d1630;--border:#1a3360;--blue:#2563eb;--blue-light:#3b82f6;--text:#e2e8f0;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Tajawal',sans-serif;color:var(--text);min-height:100vh}
.topbar{background:#0a1020;border-bottom:2px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:900;color:#fff}.logo span{color:var(--blue-light)}
.logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:7px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer}
.logout:hover{border-color:var(--blue-light);color:var(--blue-light)}
.section-title{padding:20px 20px 10px;font-size:12px;color:var(--blue-light);font-weight:700;letter-spacing:2px}
.brands-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 20px}
@media(min-width:600px){.brands-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.brands-grid{grid-template-columns:repeat(5,1fr)}}
.brand-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all 0.2s;text-decoration:none}
.brand-card:hover{border-color:var(--blue-light);transform:translateY(-2px);box-shadow:0 4px 20px rgba(37,99,235,0.2)}
.brand-icon{width:48px;height:48px;border-radius:12px;background:#152040;display:flex;align-items:center;justify-content:center;font-size:22px}
.brand-name{font-size:15px;font-weight:700;color:var(--text)}
.brand-count{font-size:11px;color:var(--blue-light);background:rgba(37,99,235,0.1);padding:2px 8px;border-radius:10px}
.brand-count.soon{color:var(--muted);background:transparent}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">مسار <span>PRO</span></div>
  <button class="logout" onclick="signOut()">خروج ←</button>
</div>
<div class="section-title">اختر الماركة</div>
<div class="brands-grid">
  <a href="samsung.html" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Samsung</div>
    <div class="brand-count" id="count-samsung">...</div>
  </a>
  <a href="redmi.html" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Redmi</div>
    <div class="brand-count" id="count-redmi">...</div>
  </a>
  <a href="infinix.html" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Infinix</div>
    <div class="brand-count soon" id="count-infinix">قريباً</div>
  </a>
  <a href="tecno.html" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Tecno</div>
    <div class="brand-count soon" id="count-tecno">قريباً</div>
  </a>
  <a href="#" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Huawei</div>
    <div class="brand-count soon">قريباً</div>
  </a>
  <a href="#" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Realme</div>
    <div class="brand-count soon">قريباً</div>
  </a>
  <a href="#" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Vivo</div>
    <div class="brand-count soon">قريباً</div>
  </a>
  <a href="#" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Oppo</div>
    <div class="brand-count soon">قريباً</div>
  </a>
  <a href="#" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">Nokia</div>
    <div class="brand-count soon">قريباً</div>
  </a>
  <a href="#" class="brand-card">
    <div class="brand-icon">📱</div>
    <div class="brand-name">iPhone</div>
    <div class="brand-count soon">قريباً</div>
  </a>
</div>

<script>
window.signOut = () => {
  localStorage.removeItem('msar_auth');
  window.location.href='index.html';
};
(function(){
  const raw = localStorage.getItem('msar_auth');
  if(!raw){ window.location.href='index.html'; return; }
  try{
    const auth = JSON.parse(raw);
    if(!auth.email || !auth.code){ window.location.href='index.html'; return; }
    if(auth.expires && new Date(auth.expires) < new Date()){
      localStorage.removeItem('msar_auth');
      window.location.href='index.html'; return;
    }
  } catch(e){ window.location.href='index.html'; }
})();

// دالة تحسب عدد الموديلات من ملف HTML
async function countModels(file, selector) {
  try {
    const res = await fetch(file + '?v=' + Date.now());
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'text/html');
    const items = doc.querySelectorAll(selector);
    return items.length;
  } catch(e) {
    return null;
  }
}

// تحديث العدادات تلقائياً
async function updateCounts() {
  // Samsung — يحسب model-item في صفحة الموديلات
  const samsungCount = await countModels('samsung.html', '#page-models .model-item');
  if(samsungCount !== null) {
    document.getElementById('count-samsung').textContent = samsungCount + ' موديل';
    document.getElementById('count-samsung').classList.remove('soon');
  }

  // Redmi — يحسب model-item في صفحة REDMI
  const redmiCount = await countModels('redmi.html', '#page-redmi .model-item');
  if(redmiCount !== null) {
    document.getElementById('count-redmi').textContent = redmiCount + ' موديل';
    document.getElementById('count-redmi').classList.remove('soon');
  }
}

updateCounts();
</script>
</body>
</html>
