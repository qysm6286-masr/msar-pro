<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسار PRO — المكتبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d1f;--card:#0d1630;--border:#1a3360;--blue:#2563eb;--blue-light:#3b82f6;--text:#e2e8f0;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Tajawal',sans-serif;color:var(--text);min-height:100vh}
.topbar{background:#0a1020;border-bottom:2px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:900;color:#fff}.logo span{color:var(--blue-light)}
.logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:7px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer}
.logout:hover{border-color:var(--blue-light);color:var(--blue-light)}
.section-title{padding:20px 20px 10px;font-size:12px;color:var(--blue-light);font-weight:700;letter-spacing:2px}
.brands-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 20px}
@media(min-width:600px){.brands-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.brands-grid{grid-template-columns:repeat(5,1fr)}}
.brand-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all 0.2s;text-decoration:none}
.brand-card:hover{border-color:var(--blue-light);transform:translateY(-2px);box-shadow:0 4px 20px rgba(37,99,235,0.2)}
.brand-icon{width:48px;height:48px;border-radius:12px;background:#152040;display:flex;align-items:center;justify-content:center;font-size:22px}
.brand-name{font-size:15px;font-weight:700;color:var(--text)}
.brand-count{font-size:11px;color:var(--blue-light);background:rgba(37,99,235,0.1);padding:2px 8px;border-radius:10px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">مسار <span>PRO</span></div>
  <button class="logout" onclick="signOut()">خروج ←</button>
</div>
<div class="section-title">اختر الماركة</div>
<div class="brands-grid">
  <a href="samsung.html" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Samsung</div><div class="brand-count">38 موديل</div></a>
  <a href="redmi.html" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Redmi</div><div class="brand-count">قريباً</div></a>
  <a href="infinix.html" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Infinix</div><div class="brand-count">قريباً</div></a>
  <a href="tecno.html" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Tecno</div><div class="brand-count">قريباً</div></a>
  <a href="#" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Huawei</div><div class="brand-count">قريباً</div></a>
  <a href="#" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Realme</div><div class="brand-count">قريباً</div></a>
  <a href="#" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Vivo</div><div class="brand-count">قريباً</div></a>
  <a href="#" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Oppo</div><div class="brand-count">قريباً</div></a>
  <a href="#" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">Nokia</div><div class="brand-count">قريباً</div></a>
  <a href="#" class="brand-card"><div class="brand-icon">📱</div><div class="brand-name">iPhone</div><div class="brand-count">قريباً</div></a>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://dqjtmxdclpipiisfrkjr.supabase.co','sb_publishable_c2mjopyiLYe9vRi1hUIBsA_NLadWVob');
window.signOut = async () => { await supabase.auth.signOut(); localStorage.removeItem('msar_auth'); window.location.href='index.html'; };
(async()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  const saved = localStorage.getItem('msar_auth');
  if(!saved){window.location.href='index.html';return;}
  const auth = JSON.parse(saved);
  if(auth.email !== session.user.email){window.location.href='index.html';return;}
  if(auth.expires && new Date(auth.expires)<new Date()){window.location.href='index.html';return;}
})();
</script>
</body>
</html>
