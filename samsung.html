/* الشريط العلوي */
.top-icons {
    display: flex;

    color: white;
    padding: 15px;

}

}

}

}

/* الأزرار */
.btn {
    display: block;
    background: white;
    margin: 8px 0;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    color: black;
    border: 1px solid #ddd;
    transition: 0.2s;
}

.btn:hover {
    background: #eee;
}
