<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Samsung</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction: rtl;
    background:#f4f4f4;
}

/* الشريط العلوي */
.top-bar{
    display:flex;
    justify-content:space-around;
    background:#111;
    color:white;
    padding:15px 0;
    font-size:18px;
}

.tab{
    text-align:center;
    flex:1;
}

/* قسم A */
.section{
    padding:20px;
}

.section-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
    color:#222;
}

/* الأزرار */
.btn{
    display:block;
    background:white;
    margin:8px auto;
    padding:10px 15px;
    width:80%;
    max-width:280px;
    text-align:center;
    border-radius:25px;
    text-decoration:none;
    color:black;
    border:1px solid #ddd;
    transition:0.2s;
}

.btn:hover{
    background:#eaeaea;
}

/* زر غير مفعل (M و S) */
.disabled{
    opacity:0.5;
}
</style>

</head>

<body>

<!-- 🔝 الأيقونات -->
<div class="top-bar">
    <div class="tab">🅰️ Samsung A</div>
    <div class="tab disabled">🇲 Samsung M</div>
    <div class="tab disabled">🇸 Samsung S</div>
</div>

<!-- 📱 A فقط -->
