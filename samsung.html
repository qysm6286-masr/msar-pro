<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Samsung A</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction: rtl;
    background:#eef2f6;
}

/* 🔝 Tabs */
.tabs{
    display:flex;
    background:#0f172a;
    color:white;
    text-align:center;
}

.tab{
    flex:1;
    padding:14px;
    font-weight:bold;
}

.tab.active{
    background:#1d4ed8;
}

/* 📦 المحتوى */
.container{
    padding:15px;
}

/* عنوان */
.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
    color:#111;
}

/* 🧩 الأزرار */
.grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

/* زر صغير واحترافي */
.btn{
    padding:6px 10px;
    font-size:12px;
    border-radius:12px;
    background:white;
    border:1px solid #ddd;
    text-decoration:none;
    color:#111;
    transition:0.2s;
}

.btn:hover{
    background:#dbeafe;
    border-color:#3b82f6;
}

/* أقسام فرعية */
.group-title{
    margin:12px 0 6px;
    font-size:14px;
    color:#475569;
}
</style>

</head>

<body>

<!-- 🔝 Tabs -->
<div class="tabs">
    <div class="tab active">Samsung A</div>
    <div class="tab">Samsung M</div>
    <div class="tab">Samsung S</div>
</div>

<!-- 📱 المحتوى -->
<div class="container">

    <div class="title">أجهزة Samsung A</div>

    <div class="group-title">A0x</div>
    <div class="grid">
        <a class="btn">A01</a>
        <a class="btn">A02</a>
        <a class="btn">A02s</a>
        <a class="btn">A03</a>
        <a class="btn">A03s</a>
        <a class="btn">A04</a>
        <a class="btn">A04s</a>
        <a class="btn">A05</a>
        <a class="btn">A05s</a>
        <a class="btn">A06</a>
    </div>

    <div class="group-title">A1x - A4x</div>
    <div class="grid">
        <a class="btn">A10e</a>
        <a class="btn">A31</a>
        <a class="btn">A32</a>
        <a class="btn">A33</a>
        <a class="btn">A34</a>
        <a class="btn">A35</a>
        <a class="btn">A40</a>
        <a class="btn">A41</a>
        <a class="btn">A42</a>
    </div>

    <div class="group-title">A5x - A7x</div>
    <div class="grid">
        <a class="btn">A50</a>
        <a class="btn">A50s</a>
        <a class="btn">A51</a>
        <a class="btn">A52</a>
        <a class="btn">A52s</a>
        <a class="btn">A53</a>
        <a class="btn">A54</a>
        <a class="btn">A56</a>
        <a class="btn">A70</a>
        <a class="btn">A71</a>
        <a class="btn">A72</a>
        <a class="btn">A73</a>
    </div>

    <div class="group-title">الفئة العليا</div>
    <div class="grid">
        <a class="btn">A90</a>
    </div>

</div>

</body>
</html>
