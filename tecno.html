<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسار PRO — Tecno</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d1f;--card:#0d1630;--border:#1a3360;--blue:#2563eb;--blue-light:#3b82f6;--text:#e2e8f0;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Tajawal',sans-serif;color:var(--text);min-height:100vh}
.topbar{background:#0a1020;border-bottom:2px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:900;color:#fff}.logo span{color:var(--blue-light)}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--blue-light);padding:7px 14px;border-radius:7px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;text-decoration:none;font-weight:700}
.section-title{padding:16px 20px 8px;font-size:12px;color:var(--blue-light);font-weight:700;letter-spacing:2px}
.page{display:none}.page.active{display:block}
.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 20px}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all 0.2s}
.cat-card:hover{border-color:var(--blue-light);transform:translateY(-2px)}
.cat-card.disabled{opacity:0.4;pointer-events:none}
.cat-name{font-size:18px;font-weight:900;color:#fff}
.cat-count{font-size:11px;color:var(--blue-light);background:rgba(37,99,235,0.1);padding:2px 8px;border-radius:10px}
.cat-soon{font-size:11px;color:var(--muted)}
.models-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.models-back{background:var(--card);border:1px solid var(--border);color:var(--blue-light);padding:6px 12px;border-radius:7px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;font-weight:700}
.models-title{font-size:15px;font-weight:700;color:#fff}
.models-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.model-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;text-decoration:none;transition:border-color 0.2s}
.model-item:hover{border-color:var(--blue-light)}
.model-left{display:flex;align-items:center;gap:10px}
.model-icon{width:34px;height:34px;border-radius:8px;background:#152040;display:flex;align-items:center;justify-content:center;color:var(--blue-light);font-size:16px;flex-shrink:0}
.model-name{font-size:14px;font-weight:700;color:var(--text)}
.model-sub{font-size:11px;color:var(--muted);margin-top:2px}
.open-btn{background:#152040;border:1px solid var(--border);color:var(--blue-light);padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap}
.coming-item{background:var(--card);border:1px dashed var(--border);border-radius:10px;padding:12px 14px;color:var(--muted);font-size:13px;font-weight:700;text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">مسار <span>PRO</span></div>
  <a href="home.html" class="back-btn" id="top-back">← رجوع</a>
</div>

<!-- صفحة الفئات -->
<div class="page active" id="page-cats">
  <div class="section-title">Tecno — اختر الفئة</div>
  <div class="cats-grid">
    <div class="cat-card" onclick="showModels('pova')">
      <div class="cat-name">POVA</div>
      <div class="cat-count">قريباً</div>
    </div>
    <div class="cat-card" onclick="showModels('camon')">
      <div class="cat-name">CAMON</div>
      <div class="cat-count">قريباً</div>
    </div>
    <div class="cat-card" onclick="showModels('spark')">
      <div class="cat-name">SPARK</div>
      <div class="cat-count">قريباً</div>
    </div>
    <div class="cat-card disabled">
      <div class="cat-name">POP</div>
      <div class="cat-soon">قريباً</div>
    </div>
  </div>
</div>

<!-- صفحة موديلات POVA -->
<div class="page" id="page-pova">
  <div class="models-header">
    <button class="models-back" onclick="showCats()">← رجوع</button>
    <span class="models-title">Tecno — Series POVA</span>
  </div>
  <div class="models-list">
    <div class="coming-item">⏳ قريباً — جاري إضافة الموديلات</div>
  </div>
</div>

<!-- صفحة موديلات CAMON -->
<div class="page" id="page-camon">
  <div class="models-header">
    <button class="models-back" onclick="showCats()">← رجوع</button>
    <span class="models-title">Tecno — Series CAMON</span>
  </div>
  <div class="models-list">
    <div class="coming-item">⏳ قريباً — جاري إضافة الموديلات</div>
  </div>
</div>

<!-- صفحة موديلات SPARK -->
<div class="page" id="page-spark">
  <div class="models-header">
    <button class="models-back" onclick="showCats()">← رجوع</button>
    <span class="models-title">Tecno — Series SPARK</span>
  </div>
  <div class="models-list">
    <div class="coming-item">⏳ قريباً — جاري إضافة الموديلات</div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://dqjtmxdclpipiisfrkjr.supabase.co','sb_publishable_c2mjopyiLYe9vRi1hUIBsA_NLadWVob');
(async()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  const saved = localStorage.getItem('msar_auth');
  if(!saved){window.location.href='index.html';return;}
  const auth = JSON.parse(saved);
  if(auth.email !== session.user.email){window.location.href='index.html';return;}
  if(auth.expires && new Date(auth.expires)<new Date()){window.location.href='index.html';return;}
})();
</script>
<script>
function showModels(cat){
  document.getElementById('page-cats').classList.remove('active');
  document.getElementById('page-'+cat).classList.add('active');
  document.getElementById('top-back').style.display='none';
}
function showCats(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-cats').classList.add('active');
  document.getElementById('top-back').style.display='';
}
</script>
</body>
</html>
