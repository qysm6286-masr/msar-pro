<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسارات أجهزة تكنو - مشروع مسار</title>
    <style>
        body { background-color: #f0f2f5; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .header-title { background: white; padding: 10px 30px; border-radius: 10px; display: inline-block; border-bottom: 3px solid #c0392b; margin-bottom: 30px; font-weight: bold; color: #1a1a1a; font-size: 22px; }
        
        .back-home { position: absolute; top: 20px; right: 20px; background: #34495e; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; transition: 0.3s; z-index: 100; }
        .back-home:hover { background: #2c3e50; }

        /* تعديل الشبكة لتستوعب 4 فئات بشكل متناسق */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1300px; margin: auto; align-items: start; }
        
        .category-header { color: white; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; margin-bottom: 15px; background: #c0392b; text-transform: uppercase; }

        .models-list { display: flex; flex-direction: column; gap: 10px; background: #e9ecef; padding: 10px; border-radius: 10px; }
        
        .coming-soon { background: #dcdcdc; color: #777; padding: 12px; border-radius: 8px; border: 1px dashed #999; font-weight: bold; font-size: 14px; }
        
        @media (max-width: 600px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <a href="home.html" class="back-home">العودة للمديلات</a>

    <h1 class="header-title">مسارات أجهزة Tecno</h1>

    <div class="main-grid">
        
        <div class="category-column">
            <div class="category-header">Series SPARK</div>
            <div class="models-list">
                <div class="coming-soon">قريباً</div>
            </div>
        </div>

        <div class="category-column">
            <div class="category-header">Series CAMON</div>
            <div class="models-list">
                <div class="coming-soon">قريباً</div>
            </div>
        </div>

        <div class="category-column">
            <div class="category-header">Series POVA</div>
            <div class="models-list">
                <div class="coming-soon">قريباً</div>
            </div>
        </div>

        <div class="category-column">
            <div class="category-header">Series POP</div>
            <div class="models-list">
                <div class="coming-soon">قريباً</div>
            </div>
        </div>

    </div>

</body>
</html>
