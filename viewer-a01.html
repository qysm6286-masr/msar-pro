<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - العرض الاحترافي</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        .nav-bar { 
            background: #1a1a1a; color: #fff; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #27ae60; position: relative; z-index: 1000;
        }
        .back-btn { 
            background: #27ae60; color: white; border: none; padding: 10px 20px; 
            border-radius: 5px; cursor: pointer; text-decoration: none; 
            font-weight: bold; font-size: 14px;
        }
        .back-btn:hover { background: #2ecc71; }

        .container { height: calc(100vh - 55px); width: 100%; position: relative; background: #000; }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* حجب سهم الفتح الخارجي المزعج في الزوايا */
        .hide-arrow { position: absolute; top: 0; left: 0; width: 70px; height: 70px; background: #1a1a1a; z-index: 999; }
        .hide-arrow-right { position: absolute; top: 0; right: 0; width: 70px; height: 70px; background: #1a1a1a; z-index: 999; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="nav-bar">
        <span>مشروع مسار | المخطط التقني</span>
        <a href="samsung.html" class="back-btn">العودة للموديلات</a>
    </div>

    <div class="container">
        <div class="hide-arrow"></div>
        <div class="hide-arrow-right"></div>
        
        <iframe src="https://res.cloudinary.com/donyquhz9/image/upload/v1779202101/A01-A015C_ilk0ho.pdf"></iframe>
    </div>

    <script>
        // منع اختصارات لوحة المفاتيح للحماية
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 's'  e.key === 'p'  e.key === 'u' || (e.shiftKey && e.key === 'I'))) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
