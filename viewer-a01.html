<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - العرض الاحترافي</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        .nav-bar { 
            background: #1a1a1a; color: #fff; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #27ae60; position: relative; z-index: 1000;
        }
        .back-btn { background: #27ae60; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; }
        
        .container { 
            height: calc(100vh - 55px); width: 100%; 
            display: flex; justify-content: center; align-items: center;
        }

        iframe { 
            width: 100%; height: 100%; border: none; 
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="nav-bar">
        <span>مشروع مسار | المخطط التقني</span>
        <a href="samsung.html" class="back-btn">العودة للموديلات</a>
    </div>

    <div class="container">
        <iframe src="https://drive.google.com/file/d/18ybb3Rxe-SxPWrwJF1aO0aR4HjVTlh6B/preview"></iframe>
    </div>

    <script>
        // منع اختصارات لوحة المفاتيح (حفظ، طباعة، عرض المصدر)
        document.addEventListener('keydown', function(e) {
            // تعطيل Ctrl+S (حفظ), Ctrl+P (طباعة), Ctrl+U (عرض الكود), Ctrl+Shift+I (المطورين)
            if (e.ctrlKey && (e.key === 's'  e.key === 'p'  e.key === 'u' || (e.shiftKey && e.key === 'I'))) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
