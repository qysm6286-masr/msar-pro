<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - العرض الاحترافي</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        .nav-bar { 
            background: #1a1a1a; color: #fff; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #27ae60; position: relative; z-index: 1000;
        }
        .controls { display: flex; gap: 10px; align-items: center; }
        .back-btn, .fullscreen-btn { 
            background: #27ae60; color: white; border: none; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; text-decoration: none; 
            font-weight: bold; font-size: 14px; transition: 0.3s; 
        }
        .fullscreen-btn { background: #2980b9; } /* لون أزرق مميز للتكبير */
        .back-btn:hover, .fullscreen-btn:hover { opacity: 0.8; }
        .container { height: calc(100vh - 55px); width: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        /* حجب السهم */
        .hide-arrow { position: absolute; top: 0; left: 0; width: 60px; height: 60px; background: #1a1a1a; z-index: 999; }
        .hide-arrow-right { position: absolute; top: 0; right: 0; width: 60px; height: 60px; background: #1a1a1a; z-index: 999; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="nav-bar">
        <span>مشروع مسار | المخطط التقني</span>
        <div class="controls">
            <button class="fullscreen-btn" onclick="toggleFullScreen()">📺 ملء الشاشة</button>
            <a href="samsung.html" class="back-btn">العودة</a>
        </div>
    </div>

    <div class="container">
        <div class="hide-arrow"></div>
        <div class="hide-arrow-right"></div>
        <iframe src="https://drive.google.com/file/d/18ybb3Rxe-SxPWrwJF1aO0aR4HjVTlh6B/preview"></iframe>
    </div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 's'  e.key === 'p'  e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
