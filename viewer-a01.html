<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - العرض الاحترافي المطور</title>
    <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        
        .nav-bar { 
            background: #1a1a1a; color: #fff; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #27ae60; position: relative; z-index: 100;
        }

        .back-btn { 
            background: #27ae60; color: white; border: none; padding: 8px 20px; 
            border-radius: 5px; cursor: pointer; text-decoration: none; 
            font-weight: bold; transition: 0.3s; 
        }
        .back-btn:hover { background: #2ecc71; }

        /* منطقة العرض */
        .container { 
            height: calc(100vh - 55px); width: 100%; 
            display: flex; justify-content: center; align-items: center; 
            cursor: grab;
        }

        .image-wrapper { position: relative; display: inline-block; }

        /* الطبقة الشفافة للحماية */
        .protection-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            background: rgba(255, 255, 255, 0); /* شفافة تماماً */
            user-select: none;
            -webkit-user-drag: none;
        }

        img {
            max-width: 95vw;
            display: block;
            pointer-events: none; /* منع التفاعل المباشر مع الصورة */
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="nav-bar">
        <span>مشروع مسار | عرض المخطط (زوم مطور)</span>
        <a href="samsung.html" class="back-btn">العودة للموديلات</a>
    </div>

    <div class="container" id="scene">
        <div class="image-wrapper" id="zoom-element">
            <div class="protection-layer"></div>
            
            <img src="https://drive.google.com/uc?export=view&id=18ybb3Rxe-SxPWrwJF1aO0aR4HjVTlh6B" alt="مخطط مسار">
        </div>
    </div>

    <script>
        // تشغيل نظام الزوم والتحريك
        var element = document.getElementById('zoom-element');
        var instance = panzoom(element, {
            maxZoom: 8, // تكبير يصل لـ 8 أضعاف
            minZoom: 0.5,
            initialZoom: 1,
            bounds: true
        });

        // منع اختصارات الحفظ والطباعة
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 's'  e.key === 'p'  e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
