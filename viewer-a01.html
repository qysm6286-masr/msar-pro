<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مسار - العرض الاحترافي</title>
    <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        .nav-bar { 
            background: #1a1a1a; color: #fff; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #27ae60; position: relative; z-index: 1000;
        }
        .back-btn { background: #27ae60; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #2ecc71; }
        
        .container { 
            height: calc(100vh - 55px); width: 100%; 
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* الطبقة الشفافة لمنع التحميل والنسخ */
        .protection-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 500;
            background: rgba(255, 255, 255, 0); /* شفافة تماماً */
            cursor: grab;
        }

        #zoom-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe { 
            width: 90vw; height: 80vh; border: none; 
            pointer-events: all; /* السماح للمتصفح بعرض المحتوى */
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="nav-bar">
        <span>مشروع مسار | المخطط التقني</span>
        <a href="samsung.html" class="back-btn">العودة للموديلات</a>
    </div>

    <div class="container">
        <div class="protection-layer"></div>
        
        <div id="zoom-wrapper">
            <iframe src="https://drive.google.com/file/d/18ybb3Rxe-SxPWrwJF1aO0aR4HjVTlh6B/preview"></iframe>
        </div>
    </div>

    <script>
        // تفعيل الزوم الخارق على حاوية الـ iframe
        var element = document.getElementById('zoom-wrapper');
        panzoom(element, {
            maxZoom: 5,
            minZoom: 0.5,
            initialZoom: 1,
            bounds: true
        });

        // منع اختصارات لوحة المفاتيح للحفظ والطباعة
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 's'  e.key === 'p'  e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
