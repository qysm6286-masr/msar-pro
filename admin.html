<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسار PRO — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d1f;--card:#0d1630;--border:#1a3360;--blue:#2563eb;--blue-light:#3b82f6;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--error:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Tajawal',sans-serif;color:var(--text);min-height:100vh;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:20px}
.logo{font-size:20px;font-weight:900}.logo span{color:var(--blue-light)}
.badge{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.stat-value{font-size:32px;font-weight:900;color:var(--blue-light)}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:18px;background:var(--blue-light);border-radius:2px;display:inline-block}
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.input-group{flex:1;min-width:140px}
.input-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}
.input-group select{width:100%;background:#0a1628;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none}
.btn{padding:10px 20px;border:none;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-light));color:#fff}
.btn-copy{background:rgba(37,99,235,0.15);border:1px solid rgba(37,99,235,0.3);color:var(--blue-light);padding:6px 12px;font-size:12px}
.result-box{background:#0a1628;border:1px solid var(--success);border-radius:10px;padding:16px;margin-top:16px;display:none}
.result-code{font-size:22px;font-weight:900;letter-spacing:4px;color:#6ee7b7;text-align:center;margin:8px 0}
.result-info{font-size:12px;color:var(--muted);text-align:center}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;text-align:right;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(26,51,96,0.5)}
.status-active{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700}
.status-used{background:rgba(100,116,139,0.1);border:1px solid rgba(100,116,139,0.3);color:var(--muted);padding:3px 8px;border-radius:5px;font-size:11px}
.status-expired{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:3px 8px;border-radius:5px;font-size:11px}
.empty{text-align:center;padding:30px;color:var(--muted)}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;display:block}
</style>
</head>
<body>
<div class="header">
  <div class="logo">مسار <span>PRO</span> — لوحة التحكم</div>
  <div class="badge">🔒 للمسؤول فقط</div>
</div>
<div class="grid">
  <div class="stat-card"><div class="stat-label">إجمالي الأكواد</div><div class="stat-value" id="stat-total">—</div></div>
  <div class="stat-card"><div class="stat-label">الاشتراكات النشطة</div><div class="stat-value" id="stat-active">—</div></div>
</div>
<div class="section">
  <div class="section-title">توليد كود اشتراك جديد</div>
  <div class="form-row">
    <div class="input-group">
      <label>مدة الاشتراك</label>
      <select id="duration">
        <option value="30">شهر واحد (30 يوم)</option>
        <option value="90">3 أشهر</option>
        <option value="180">6 أشهر</option>
        <option value="365" selected>سنة كاملة</option>
        <option value="36500">مدى الحياة</option>
      </select>
    </div>
    <div class="input-group" style="flex:0;min-width:auto;display:flex;align-items:flex-end">
      <button class="btn btn-primary" onclick="generateCode()">توليد كود ←</button>
    </div>
  </div>
  <div id="gen-msg" class="msg"></div>
  <div class="result-box" id="result-box">
    <div class="result-info">الكود الجديد:</div>
    <div class="result-code" id="result-code">—</div>
    <div class="result-info" id="result-expires">—</div>
    <div style="text-align:center;margin-top:12px">
      <button class="btn btn-copy" onclick="copyCode()">📋 نسخ الكود</button>
    </div>
  </div>
</div>
<div class="section">
  <div class="section-title">جميع الأكواد</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>الكود</th><th>البريد الإلكتروني</th><th>الحالة</th><th>تاريخ الانتهاء</th></tr></thead>
      <tbody id="codes-table"><tr><td colspan="4" class="empty">جاري التحميل...</td></tr></tbody>
    </table>
  </div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SUPABASE_URL = 'https://dqjtmxdclpipiisfrkjr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_c2mjopyiLYe9vRi1hUIBsA_NLadWVob';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
function randomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 12; i++) {
    if (i > 0 && i % 4 === 0) code += '-';
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}
window.generateCode = async () => {
  const days = parseInt(document.getElementById('duration').value);
  const code = randomCode();
  const expires = days === 36500 ? null : new Date(Date.now() + days * 86400000).toISOString();
  const { error } = await supabase.from('codes').insert({ code, used: false, email: null, expires_at: expires, created_at: new Date().toISOString() });
  if (error) { document.getElementById('gen-msg').textContent = 'خطأ: ' + error.message; document.getElementById('gen-msg').className = 'msg error'; return; }
  document.getElementById('result-code').textContent = code;
  document.getElementById('result-expires').textContent = expires ? 'صالح حتى: ' + new Date(expires).toLocaleDateString('ar') : 'مدى الحياة';
  document.getElementById('result-box').style.display = 'block';
  loadCodes();
};
window.copyCode = () => {
  navigator.clipboard.writeText(document.getElementById('result-code').textContent);
  document.querySelector('.btn-copy').textContent = '✅ تم النسخ';
  setTimeout(() => document.querySelector('.btn-copy').textContent = '📋 نسخ الكود', 2000);
};
async function loadCodes() {
  const { data } = await supabase.from('codes').select('*').order('created_at', { ascending: false });
  if (!data) return;
  const now = new Date(); let active = 0;
  const rows = data.map(row => {
    const expired = row.expires_at && new Date(row.expires_at) < now;
    let status, cls;
    if (expired) { status = 'منتهي'; cls = 'status-expired'; }
    else if (row.used) { status = 'مستخدم'; cls = 'status-used'; active++; }
    else { status = 'جديد'; cls = 'status-active'; }
    return `<tr><td style="font-weight:700;letter-spacing:2px;font-size:12px">${row.code}</td><td style="font-size:12px;color:var(--muted)">${row.email||'—'}</td><td><span class="${cls}">${status}</span></td><td style="font-size:12px;color:var(--muted)">${row.expires_at?new Date(row.expires_at).toLocaleDateString('ar'):'مدى الحياة'}</td></tr>`;
  }).join('');
  document.getElementById('codes-table').innerHTML = rows || '<tr><td colspan="4" class="empty">لا توجد أكواد بعد</td></tr>';
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-active').textContent = active;
}
loadCodes();
</script>
</body>
</html>
